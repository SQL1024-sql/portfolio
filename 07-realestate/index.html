<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森林之丘 | 預售建案</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;color:#33403a;line-height:1.7;}
  .hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#fff;background:linear-gradient(rgba(20,40,30,.45),rgba(20,40,30,.6)),url('https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1600&q=80') center/cover;}
  .hero small{letter-spacing:6px;font-size:.9rem;margin-bottom:18px;}
  .hero h1{font-size:4.4rem;letter-spacing:8px;font-weight:300;}
  .hero p{margin-top:18px;letter-spacing:3px;font-size:1.1rem;}
  .btn{display:inline-block;margin-top:36px;background:#45a247;color:#fff;padding:16px 46px;border-radius:4px;text-decoration:none;letter-spacing:2px;}
  .info-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:60px;background:#283c86;color:#fff;padding:40px;text-align:center;}
  .info-bar .item small{display:block;opacity:.7;font-size:.85rem;margin-bottom:6px;letter-spacing:2px;}
  .info-bar .item b{font-size:1.5rem;font-weight:600;}
  section{padding:90px 7%;}
  h2.title{text-align:center;font-size:2.4rem;font-weight:300;letter-spacing:4px;margin-bottom:50px;}
  .features{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;max-width:1050px;margin:0 auto;}
  .feat{text-align:center;padding:36px;background:#f4f7f5;border-radius:10px;}
  .feat .ico{font-size:2.8rem;margin-bottom:16px;}
  .feat h3{margin-bottom:10px;}
  .feat p{color:#6b7c73;font-size:.95rem;}
  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:1100px;margin:0 auto;}
  .gallery img{width:100%;height:240px;object-fit:cover;border-radius:8px;}
  .cta{background:#33403a;color:#fff;text-align:center;}
  .cta h2{font-weight:300;letter-spacing:4px;font-size:2.2rem;margin-bottom:16px;}
  footer{text-align:center;padding:34px;color:#8a9a92;font-size:.9rem;}
  @media(max-width:760px){.hero h1{font-size:2.6rem;}.features,.gallery{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="hero">
  <small>FOREST HILL RESIDENCE</small>
  <h1>森林之丘</h1>
  <p>與綠意為鄰　預約一生的理想居所</p>
  <a href="#cta" class="btn">預約賞屋</a>
</div>
<div class="info-bar">
  <div class="item"><small>建案位置</small><b>新北 · 林口特區</b></div>
  <div class="item"><small>坪數規劃</small><b>28–45 坪</b></div>
  <div class="item"><small>公開價格</small><b>每坪 38 萬起</b></div>
  <div class="item"><small>預計完工</small><b>2028 Q2</b></div>
</div>
<section>
  <h2 class="title">建案特色</h2>
  <div class="features">
    <div class="feat"><div class="ico">🌳</div><h3>環山綠景</h3><p>三面採光，坐擁森林公園第一排</p></div>
    <div class="feat"><div class="ico">🏊</div><h3>頂級公設</h3><p>泳池、健身房、空中花園一應俱全</p></div>
    <div class="feat"><div class="ico">🚇</div><h3>雙捷運</h3><p>步行 8 分鐘抵達捷運站</p></div>
  </div>
</section>
<section style="background:#f4f7f5;">
  <h2 class="title">實景示意</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=600&q=80" alt="客廳">
    <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=600&q=80" alt="外觀">
    <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=600&q=80" alt="臥室">
  </div>
</section>
<section id="cta" class="cta">
  <h2>誠摯邀請您蒞臨參觀</h2>
  <p style="color:#bcc9c2;">接待中心：新北市林口區森丘路 100 號</p>
  <a href="tel:0800888999" class="btn" style="margin-top:28px;">0800-888-999 預約專線</a>
</section>
<footer>森林之丘建案 · 本廣告及示意圖僅供參考 · 本頁為作品集範例</footer>
</body>
</html>
