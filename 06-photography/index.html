<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAME 攝影工作室</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;background:#0f0f0f;color:#eee;}
  nav{display:flex;justify-content:space-between;align-items:center;padding:24px 5%;position:fixed;width:100%;z-index:10;mix-blend-mode:difference;}
  nav .logo{font-weight:300;letter-spacing:8px;font-size:1.3rem;}
  nav a{color:#fff;text-decoration:none;margin-left:26px;font-size:.85rem;letter-spacing:2px;}
  .hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.5)),url('https://images.unsplash.com/photo-1452587925148-ce544e77e70d?auto=format&fit=crop&w=1600&q=80') center/cover;}
  .hero h1{font-size:5rem;font-weight:200;letter-spacing:14px;}
  .hero p{margin-top:20px;letter-spacing:5px;color:#ccc;font-size:.95rem;}
  .gallery{columns:3;column-gap:12px;padding:80px 5%;}
  .gallery img{width:100%;margin-bottom:12px;border-radius:4px;display:block;filter:grayscale(20%);transition:.4s;}
  .gallery img:hover{filter:grayscale(0%);transform:scale(1.02);}
  .about{text-align:center;padding:100px 5%;}
  .about h2{font-weight:200;letter-spacing:8px;font-size:2.4rem;margin-bottom:24px;}
  .about p{max-width:560px;margin:0 auto;color:#aaa;line-height:2;letter-spacing:1px;}
  footer{text-align:center;padding:50px;color:#666;letter-spacing:3px;font-size:.85rem;border-top:1px solid #222;}
  @media(max-width:760px){.hero h1{font-size:2.4rem;letter-spacing:6px;}.gallery{columns:1;}nav a{display:none;}}
</style>
</head>
<body>
<nav><div class="logo">FRAME</div><div><a href="#work">WORK</a><a href="#about">ABOUT</a><a href="#">CONTACT</a></div></nav>
<div class="hero"><h1>FRAME</h1><p>VISUAL STORYTELLING STUDIO</p></div>
<div class="gallery" id="work">
  <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=600&q=80" alt="婚禮">
  <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=600&q=80" alt="人像">
  <img src="https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?auto=format&fit=crop&w=600&q=80" alt="婚紗">
  <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=600&q=80" alt="活動">
  <img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?auto=format&fit=crop&w=600&q=80" alt="婚禮2">
  <img src="https://images.unsplash.com/photo-1537633552985-df8429e8048b?auto=format&fit=crop&w=600&q=80" alt="人像2">
  <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=600&q=80" alt="婚禮3">
  <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=600&q=80" alt="人像3">
  <img src="https://images.unsplash.com/photo-1525258946800-98cfd641d0de?auto=format&fit=crop&w=600&q=80" alt="情侶">
</div>
<section class="about" id="about">
  <h2>ABOUT</h2>
  <p>FRAME 是一間專注於人像與婚禮紀實的攝影工作室。我們相信，最動人的畫面來自最真實的瞬間。不擺拍、不刻意，只在對的時刻按下快門，為你留住那些再也回不去的當下。</p>
</section>
<footer>FRAME STUDIO · TAIPEI · 本頁為作品集範例</footer>
</body>
</html>
