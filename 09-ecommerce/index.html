<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA 無線耳機 | 沉浸你的世界</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;color:#101418;background:#fff;line-height:1.7;}
  nav{display:flex;justify-content:space-between;align-items:center;padding:18px 6%;position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);z-index:20;border-bottom:1px solid #eee;}
  nav .logo{font-weight:800;letter-spacing:3px;font-size:1.3rem;}
  .cart-btn{position:relative;cursor:pointer;font-size:1.5rem;background:none;border:none;}
  .cart-count{position:absolute;top:-8px;right:-10px;background:#11998e;color:#fff;font-size:.7rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .hero{display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:40px;padding:70px 6%;background:linear-gradient(135deg,#0f2027,#203a43);color:#fff;}
  .hero small{letter-spacing:4px;color:#38ef7d;}
  .hero h1{font-size:3.4rem;margin:14px 0 18px;line-height:1.2;}
  .hero p{color:#b8c4cc;max-width:420px;font-size:1.1rem;}
  .hero .visual{font-size:13rem;text-align:center;}
  .specs{display:flex;justify-content:center;gap:70px;flex-wrap:wrap;padding:60px 6%;border-bottom:1px solid #eee;}
  .spec{text-align:center;}
  .spec b{display:block;font-size:2.2rem;color:#11998e;}
  .spec span{color:#667;font-size:.9rem;}
  .buy{max-width:1000px;margin:70px auto;padding:0 6%;display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center;}
  .buy .img{height:340px;background:linear-gradient(135deg,#11998e,#38ef7d);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:8rem;}
  .buy h2{font-size:2rem;margin-bottom:10px;}
  .price{font-size:2.6rem;font-weight:800;color:#11998e;margin:16px 0;}
  .price del{font-size:1.2rem;color:#aaa;font-weight:400;margin-left:10px;}
  .qty{display:flex;align-items:center;gap:16px;margin:20px 0;}
  .qty button{width:40px;height:40px;border:1px solid #ccc;background:#fff;font-size:1.3rem;border-radius:8px;cursor:pointer;}
  .qty span{font-size:1.3rem;min-width:30px;text-align:center;}
  .add{width:100%;background:#101418;color:#fff;border:none;padding:18px;border-radius:12px;font-size:1.05rem;cursor:pointer;transition:.3s;}
  .add:hover{background:#11998e;}
  .add.added{background:#38ef7d;color:#101418;}
  /* cart drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;visibility:hidden;transition:.3s;z-index:30;}
  .overlay.open{opacity:1;visibility:visible;}
  .drawer{position:fixed;top:0;right:-400px;width:380px;max-width:90vw;height:100%;background:#fff;z-index:40;transition:.35s;padding:26px;display:flex;flex-direction:column;}
  .drawer.open{right:0;}
  .drawer h3{margin-bottom:20px;display:flex;justify-content:space-between;}
  .drawer h3 button{background:none;border:none;font-size:1.4rem;cursor:pointer;}
  .cart-items{flex:1;overflow-y:auto;}
  .ci{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #eee;}
  .ci .x{color:#c0392b;cursor:pointer;background:none;border:none;font-size:1rem;}
  .empty{color:#999;text-align:center;margin-top:40px;}
  .total{display:flex;justify-content:space-between;font-size:1.3rem;font-weight:800;padding:18px 0;}
  .checkout{background:#11998e;color:#fff;border:none;padding:16px;border-radius:12px;font-size:1.05rem;cursor:pointer;}
  @media(max-width:760px){.hero,.buy{grid-template-columns:1fr;}.hero .visual{display:none;}.hero h1{font-size:2.4rem;}}
</style>
</head>
<body>
<nav>
  <div class="logo">AURA</div>
  <button class="cart-btn" onclick="openCart()">🛒<span class="cart-count" id="count">0</span></button>
</nav>
<div class="hero">
  <div>
    <small>NEW · 2026</small>
    <h1>AURA Pro<br>無線降噪耳機</h1>
    <p>40 小時續航、主動降噪、空間音訊。為你隔絕世界的喧囂，只留下純粹的聲音。</p>
  </div>
  <div class="visual">🎧</div>
</div>
<div class="specs">
  <div class="spec"><b>40h</b><span>超長續航</span></div>
  <div class="spec"><b>-42dB</b><span>主動降噪</span></div>
  <div class="spec"><b>0.05s</b><span>低延遲</span></div>
  <div class="spec"><b>IPX5</b><span>防水防汗</span></div>
</div>
<div class="buy">
  <div class="img">🎧</div>
  <div>
    <h2>AURA Pro 無線降噪耳機</h2>
    <p style="color:#667;">午夜黑 · 原廠保固一年</p>
    <div class="price">NT$3,990<del>NT$4,990</del></div>
    <div class="qty">
      <button onclick="changeQty(-1)">−</button>
      <span id="qty">1</span>
      <button onclick="changeQty(1)">+</button>
    </div>
    <button class="add" id="addBtn" onclick="addToCart()">加入購物車</button>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <h3>購物車 <button onclick="closeCart()">✕</button></h3>
  <div class="cart-items" id="cartItems"><p class="empty">購物車是空的</p></div>
  <div class="total"><span>總計</span><span id="total">NT$0</span></div>
  <button class="checkout" onclick="alert('這是作品集範例，結帳功能僅供展示 🙂')">前往結帳</button>
</div>
<script>
  const PRICE = 3990;
  let qty = 1;
  let cart = []; // {qty}
  function changeQty(d){ qty = Math.max(1, qty + d); document.getElementById('qty').textContent = qty; }
  function addToCart(){
    cart.push({qty});
    const btn = document.getElementById('addBtn');
    btn.textContent = '✓ 已加入'; btn.classList.add('added');
    setTimeout(()=>{ btn.textContent='加入購物車'; btn.classList.remove('added'); }, 1200);
    render();
  }
  function removeItem(i){ cart.splice(i,1); render(); }
  function render(){
    const totalQty = cart.reduce((s,it)=>s+it.qty,0);
    document.getElementById('count').textContent = totalQty;
    const box = document.getElementById('cartItems');
    if(cart.length===0){ box.innerHTML='<p class="empty">購物車是空的</p>'; }
    else{
      box.innerHTML = cart.map((it,i)=>`<div class="ci"><div>AURA Pro 耳機 × ${it.qty}</div><div>NT$${(PRICE*it.qty).toLocaleString()} <button class="x" onclick="removeItem(${i})">移除</button></div></div>`).join('');
    }
    const total = cart.reduce((s,it)=>s+it.qty*PRICE,0);
    document.getElementById('total').textContent = 'NT$'+total.toLocaleString();
  }
  function openCart(){ document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
  function closeCart(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
</script>
</body>
</html>
